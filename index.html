<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Minimalist Gallery</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
  }

  #loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.5rem;
    opacity: 0.8;
  }

  #scene {
    width: 100%;
    height: 100%;
    perspective: 1200px;
    display: none;
  }

  #gallery {
    width: 100%;
    height: 100%;
    position: absolute;
    transform-style: preserve-3d;
    transition: transform 0.1s linear;
  }

  .frame {
    position: absolute;
    width: 220px;
    height: 300px;
    left: 50%;
    top: 50%;
    transform-style: preserve-3d;
    margin: -150px 0 0 -110px;
    border-radius: 15px;
    overflow: hidden;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: transform 0.3s;
  }

  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .frame:hover {
    transform: scale(1.08);
  }

  #info {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 0.9rem;
    opacity: 0.7;
  }

  #toggleRotate {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    color: white;
  }

  #card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 320px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    transition: 0.3s;
    text-align: center;
  }

  #card.active {
    transform: translate(-50%, -50%) scale(1);
  }

  #card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  #card h3 {
    margin-bottom: 10px;
  }

  #close {
    margin-top: 10px;
    cursor: pointer;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div id="loader">Loading gallery...</div>

<div id="scene">
  <div id="gallery"></div>

  <div id="info">
    Drag to rotate • Click artwork to enlarge
  </div>

  <button id="toggleRotate">Auto-rotate</button>
</div>

<div id="card">
  <img id="cardImg"/>
  <h3 id="cardTitle"></h3>
  <p id="cardDesc"></p>
  <div id="close">Close</div>
</div>

<script>
  const gallery = document.getElementById("gallery");
  const loader = document.getElementById("loader");
  const scene = document.getElementById("scene");
  const toggleBtn = document.getElementById("toggleRotate");

  const card = document.getElementById("card");
  const cardImg = document.getElementById("cardImg");
  const cardTitle = document.getElementById("cardTitle");
  const cardDesc = document.getElementById("cardDesc");

  const images = [
    {src: "https://picsum.photos/300/400?1", title: "Abstract Light", desc: "A study of color and motion."},
    {src: "https://picsum.photos/300/400?2", title: "Urban Mood", desc: "Minimal city expression."},
    {src: "https://picsum.photos/300/400?3", title: "Silent Nature", desc: "Stillness in green tones."},
    {src: "https://picsum.photos/300/400?4", title: "Dark Waves", desc: "Energy within darkness."},
    {src: "https://picsum.photos/300/400?5", title: "Golden Frame", desc: "Warm light reflections."},
    {src: "https://picsum.photos/300/400?6", title: "Minimal Form", desc: "Shape and space harmony."}
  ];

  let angle = 0;
  let autoRotate = true;

  function createGallery() {
    const count = images.length;
    const radius = 500;

    images.forEach((img, i) => {
      const frame = document.createElement("div");
      frame.className = "frame";

      const image = document.createElement("img");
      image.src = img.src;

      frame.appendChild(image);

      const theta = (360 / count) * i;
      frame.style.transform = `rotateY(${theta}deg) translateZ(${radius}px)`;

      frame.onclick = () => {
        cardImg.src = img.src;
        cardTitle.innerText = img.title;
        cardDesc.innerText = img.desc;
        card.classList.add("active");
      };

      gallery.appendChild(frame);
    });
  }

  function animate() {
    if (autoRotate) angle += 0.1;
    gallery.style.transform = `rotateY(${angle}deg)`;
    requestAnimationFrame(animate);
  }

  let isDragging = false;
  let lastX;

  scene.addEventListener("mousedown", e => {
    isDragging = true;
    lastX = e.clientX;
  });

  window.addEventListener("mousemove", e => {
    if (!isDragging) return;
    let delta = e.clientX - lastX;
    angle += delta * 0.3;
    lastX = e.clientX;
  });

  window.addEventListener("mouseup", () => {
    isDragging = false;
  });

  toggleBtn.onclick = () => {
    autoRotate = !autoRotate;
    toggleBtn.style.opacity = autoRotate ? 1 : 0.5;
  };

  document.getElementById("close").onclick = () => {
    card.classList.remove("active");
  };

  window.onload = () => {
    setTimeout(() => {
      loader.style.display = "none";
      scene.style.display = "block";
      createGallery();
      animate();
    }, 1200);
  };
</script>

</body>
</html>
